<script defer>
  const btnConfig = document.getElementById("btn-config");
  const menuConfig = document.getElementById("menu-config");

  btnConfig.addEventListener("click", (e) => {
    e.stopPropagation();
    menuConfig.classList.toggle("activo");
    const isActive = menuConfig.classList.contains("activo");
    menuConfig.setAttribute("aria-hidden", !isActive);
  });

  document.addEventListener("click", (e) => {
    if (!menuConfig.contains(e.target) && e.target !== btnConfig) {
      menuConfig.classList.remove("activo");
      menuConfig.setAttribute("aria-hidden", "true");
    }
  });
</script>

<script>
  const banner = document.getElementById('cuidado-banner');
  const btnVolver = document.getElementById('cuidado-volver');
  const btnAutorizado = document.getElementById('cuidado-autorizado');

  // Ocultar si ya se aceptó

    banner.style.display = 'none';
  }

  // Botón "Volver"
